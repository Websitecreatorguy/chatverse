<!DOCTYPE html>
<html>
<head>
  <title>ChatVerse Live</title>

  <style>
    * {
      box-sizing: border-box;
    }

    /* REPLACE YOUR BODY BACKGROUND WITH THIS */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000000;
  color: white;
  min-height: 100vh;
  overflow: hidden;
}

/* ADD THIS */

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at 20% 20%, rgba(0,140,255,0.15), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(180,0,255,0.15), transparent 25%),
    radial-gradient(circle at 50% 80%, rgba(255,0,120,0.12), transparent 25%);

  animation: pulseBackground 8s infinite alternate;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

  background-size: 40px 40px;

  z-index: -1;
}

@keyframes pulseBackground {
  from {
    transform: scale(1);
    opacity: 0.7;
  }

  to {
    transform: scale(1.1);
    opacity: 1;
  }
}

/* LOADING SCREEN */

#loadingScreen {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* LOADING CIRCLE */

.loaderRing {
  width: 120px;
  height: 120px;
  border-radius: 50%;

  border: 6px solid rgba(255,255,255,0.08);
  border-top: 6px solid #8a2eff;
  border-right: 6px solid #00aaff;

  animation: spin 1.1s linear infinite;

  margin-bottom: 30px;

  box-shadow:
    0 0 20px rgba(138,46,255,0.6),
    0 0 40px rgba(0,170,255,0.4);
}

@keyframes spin {

  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }

}

/* LOADING STEPS */

.loadingSteps {
  margin-top: 20px;
  width: 320px;
}

.loadingStep {
  display: flex;
  justify-content: space-between;

  margin: 14px 0;

  color: rgba(255,255,255,0.85);

  font-size: 15px;

  letter-spacing: 0.5px;
}

.loadingDot {
  width: 12px;
  height: 12px;
  border-radius: 50%;

  background: #444;

  animation: blink 1.2s infinite;
}

.loadingDot.active {
  background: #8a2eff;

  box-shadow:
    0 0 12px #8a2eff,
    0 0 22px #00aaff;
}

@keyframes blink {

  0% {
    opacity: 0.5;
  }

  50% {
    opacity: 1;
  }

  100% {
    opacity: 0.5;
  }

}

/* LOADING BAR */

.loadingBarContainer {
  width: 340px;
  height: 12px;

  background: rgba(255,255,255,0.08);

  border-radius: 30px;

  overflow: hidden;

  margin-top: 30px;
}

.loadingBar {
  height: 100%;
  width: 0%;

  background:
    linear-gradient(
      90deg,
      #8a2eff,
      #00aaff
    );

  border-radius: 30px;

  animation: loadBar 5s forwards;

  box-shadow:
    0 0 18px #8a2eff,
    0 0 28px #00aaff;
}

@keyframes loadBar {

  from {
    width: 0%;
  }

  to {
    width: 100%;
  }

}
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 30px;
    }

    .active {
      display: block;
    }

    .lobby-container {
      max-width: 900px;
      margin: 40px auto;
      text-align: center;
    }

    .title {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #7afcff, #feff9c, #ff65a3);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: #d5d5d5;
      margin-bottom: 35px;
      font-size: 18px;
    }

    .name-box input {
      padding: 14px;
      width: 280px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      outline: none;
      text-align: center;
      margin-bottom: 30px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .room-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 22px;
      padding: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .room-card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.22);
    }

    .room-emoji {
      font-size: 45px;
      margin-bottom: 10px;
    }

    .chat-page {
      max-width: 800px;
      margin: 25px auto;
      background: rgba(255,255,255,0.12);
      border-radius: 25px;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 20px;
      background: rgba(0,0,0,0.35);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-box {
      height: 470px;
      padding: 20px;
      overflow-y: auto;
      background: rgba(255,255,255,0.08);
    }

    .message {
      margin: 12px 0;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 75%;
      clear: both;
      word-wrap: break-word;
    }

    .me {
      float: right;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: black;
    }

    .other {
      float: left;
      background: rgba(255,255,255,0.22);
    }

    .sender {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .input-area {
      display: flex;
      padding: 15px;
      background: rgba(0,0,0,0.35);
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 14px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .send-button,
    .back-button {
      border: none;
      border-radius: 25px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .send-button {
      background: #feff9c;
    }

    .back-button {
      background: #ff65a3;
      color: white;
    }
  </style>
</head>

<body>
<div id="lobbyScreen" class="screen">

  <div class="lobby-container">

    <h1 class="title">ChatVerse Live</h1>

    <p id="loadingText" class="subtitle">
      Loading Room...
    </p>

    <div class="loaderRing"></div>

    <div class="loadingSteps">

      <div class="loadingStep">
        <span>Connecting to servers...</span>
        <div class="loadingDot active"></div>
      </div>

      <div class="loadingStep">
        <span>Waiting for servers...</span>
        <div class="loadingDot active"></div>
      </div>

      <div class="loadingStep">
        <span>Loading HTML...</span>
        <div class="loadingDot active"></div>
      </div>

      <div class="loadingStep">
        <span>Loading resources...</span>
        <div class="loadingDot"></div>
      </div>

      <div class="loadingStep">
        <span>Almost ready...</span>
        <div class="loadingDot"></div>
      </div>

    </div>

    <div class="loadingBarContainer">
      <div class="loadingBar"></div>
    </div>

  </div>

</div>
  <!-- LOBBY -->
  <div id="lobbyScreen" class="screen active">

    <div class="lobby-container">

      <h1 class="title">ChatVerse Live</h1>

      <p class="subtitle">
        Choose a room and chat live
      </p>

      <div class="name-box">
        <input
          type="text"
          id="username"
          placeholder="Enter username"
        >
      </div>

      <div class="room-grid">

        <div class="room-card"
          onclick="enterRoom('gaming','🎮 Gaming Lobby')">

          <div class="room-emoji">🎮</div>
          <h2>Gaming Lobby</h2>

        </div>

        <div class="room-card"
          onclick="enterRoom('sports','⚾ Sports Lobby')">

          <div class="room-emoji">⚾</div>
          <h2>Sports Lobby</h2>

        </div>

        <div class="room-card"
          onclick="enterRoom('school','📚 School Lobby')">

          <div class="room-emoji">📚</div>
          <h2>School Lobby</h2>

        </div>

        <div class="room-card"
          onclick="enterRoom('random','💬 Random Lobby')">

          <div class="room-emoji">💬</div>
          <h2>Random Lobby</h2>

        </div>

      </div>

    </div>

  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="screen">

    <div class="chat-page">

      <div class="chat-header">

        <h1 id="roomTitle">Room</h1>

        <button
          class="back-button"
          onclick="goBack()">

          Back

        </button>

      </div>

      <div
        class="chat-box"
        id="chatBox">

      </div>

      <div class="input-area">

        <input
          type="text"
          id="messageInput"
          placeholder="Type message..."
        >

        <button
          class="send-button"
          onclick="sendMessage()">

          Send

        </button>

      </div>

    </div>

  </div>

  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDY0B4m2ul_SK4cHFydQdn6GEPVtUhqESg",
      authDomain: "chatverse-eb340.firebaseapp.com",
      projectId: "chatverse-eb340",
      storageBucket: "chatverse-eb340.firebasestorage.app",
      messagingSenderId: "537889766475",
      appId: "1:537889766475:web:e14eb4e07e032ea8d761ce"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);
setTimeout(() => {

  document
    .getElementById("loadingScreen")
    .classList
    .remove("active");

  document
    .getElementById("lobbyScreen")
    .classList
    .add("active");

}, 5000);
    let currentRoom = "";

    let unsubscribe = null;

    window.enterRoom = function(roomId, roomName) {

      const username =
        document.getElementById("username")
        .value
        .trim();

      if(username === "") {
        alert("Enter username");
        return;
      }

      currentRoom = roomId;

      document
        .getElementById("lobbyScreen")
        .classList
        .remove("active");

      document
        .getElementById("chatScreen")
        .classList
        .add("active");

      document
        .getElementById("roomTitle")
        .textContent = roomName;

      listenForMessages();

    };

    window.goBack = function() {

      document
        .getElementById("chatScreen")
        .classList
        .remove("active");

      document
        .getElementById("lobbyScreen")
        .classList
        .add("active");

    };

    window.sendMessage = async function() {

      const input =
        document.getElementById("messageInput");

      const text =
        input.value.trim();

      const username =
        document.getElementById("username")
        .value
        .trim();

      if(text === "") return;

      await addDoc(

        collection(
          db,
          "rooms",
          currentRoom,
          "messages"
        ),

        {
          username: username,
          text: text,
          createdAt: serverTimestamp()
        }

      );

      input.value = "";

    };

    function listenForMessages() {

      const chatBox =
        document.getElementById("chatBox");

      const username =
        document.getElementById("username")
        .value
        .trim();

      if(unsubscribe) {
        unsubscribe();
      }

      const q = query(

        collection(
          db,
          "rooms",
          currentRoom,
          "messages"
        ),

        orderBy("createdAt")

      );

      unsubscribe = onSnapshot(q, (snapshot) => {

        chatBox.innerHTML = "";

        snapshot.forEach((doc) => {

          const msg = doc.data();

          const div =
            document.createElement("div");

          if(msg.username === username) {
            div.className = "message me";
          } else {
            div.className = "message other";
          }

          div.innerHTML = `
            <div class="sender">
              ${msg.username}
            </div>

            ${msg.text}
          `;

          chatBox.appendChild(div);

        });

        chatBox.scrollTop =
          chatBox.scrollHeight;

      });

    }

    document
      .getElementById("messageInput")
      .addEventListener("keydown", function(e){

        if(e.key === "Enter") {
          sendMessage();
        }

      });

  </script>

</body>
</html>
